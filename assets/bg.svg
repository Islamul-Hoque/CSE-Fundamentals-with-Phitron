<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Red Glow -->
    <radialGradient id="redGlow" cx="0.1" cy="0.1" r="1.8" fx="0.1" fy="0.1">
      <stop offset="0%" stop-color="#520806" stop-opacity="0.9">
        <animate attributeName="stop-opacity" values="0.9;0.95;0.9" dur="7s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#520806" stop-opacity="0.6" />
      <stop offset="80%" stop-color="#520806" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
      <animate attributeName="cx" values="0.1;0.3;0.5;0.7;0.9;0.7;0.5;0.3;0.1" dur="24s" repeatCount="indefinite" />
      <animate attributeName="cy" values="0.1;0.3;0.5;0.7;0.9;0.7;0.5;0.3;0.1" dur="24s" repeatCount="indefinite" />
    </radialGradient>

    <!-- Blue Glow -->
    <radialGradient id="blueGlow" cx="0.9" cy="0.9" r="1.5" fx="0.9" fy="0.9">
      <stop offset="0%" stop-color="#021D4A" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#021D4A" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
      <animate attributeName="cx" values="0.9;0.7;0.5;0.3;0.1;0.3;0.5;0.7;0.9" dur="26s" repeatCount="indefinite" />
      <animate attributeName="cy" values="0.9;0.7;0.5;0.3;0.1;0.3;0.5;0.7;0.9" dur="26s" repeatCount="indefinite" />
    </radialGradient>

    <!-- Background Pattern -->
    <pattern id="bgPattern" width="100" height="100" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="100" height="100" fill="#000000"/>
      <line x1="0" y1="0" x2="100" y2="0" stroke="#101010" stroke-width="1"/>
      <line x1="0" y1="20" x2="100" y2="20" stroke="#0a0a0a" stroke-width="1"/>
      <line x1="0" y1="40" x2="100" y2="40" stroke="#101010" stroke-width="1"/>
      <line x1="0" y1="60" x2="100" y2="60" stroke="#0a0a0a" stroke-width="1"/>
      <line x1="0" y1="80" x2="100" y2="80" stroke="#101010" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background Layers -->
  <rect width="100%" height="100%" rx="10" ry="10" fill="url(#bgPattern)" />
  
  <!-- 👇 এখানে শুধু dark টা soften করা হয়েছে -->
  <rect width="100%" height="100%" rx="10" ry="10" fill="#0d0d0d" opacity="0.6" />
  
  <rect width="100%" height="100%" rx="10" ry="10" fill="url(#redGlow)" />
  <rect width="100%" height="100%" rx="10" ry="10" fill="url(#blueGlow)" />

<!-- Title -->
<text x="50%" y="45%" text-anchor="middle" dominant-baseline="middle"
      fill="white" font-size="35" font-weight="bold"
      font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif">
  CSE-Fundamentals with Phitron
</text>

<!-- Subtitle Badges -->
<g transform="translate(67.5, 125)">
  <!-- Badge 1: C/C++ -->
  <g transform="translate(0, 0)">
    <rect width="95" height="32" rx="16" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" />
    <g transform="translate(10, 6)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 17 10 11 4 5"></polyline>
        <line x1="12" y1="19" x2="20" y2="19"></line>
      </svg>
    </g>
    <text x="62.5" y="17" dominant-baseline="middle" fill="#f8fafc" font-size="12" font-family="Montserrat, Poppins, sans-serif" font-weight="600" text-anchor="middle">C/C++</text>
  </g>

  <!-- Badge 2: DSA -->
  <g transform="translate(110, 0)">
    <rect width="85" height="32" rx="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" />
    <g transform="translate(10, 6)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"></circle>
        <circle cx="6" cy="12" r="3"></circle>
        <circle cx="18" cy="19" r="3"></circle>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
      </svg>
    </g>
    <text x="57.5" y="17" dominant-baseline="middle" fill="#f8fafc" font-size="12" font-family="Montserrat, Poppins, sans-serif" font-weight="600" text-anchor="middle">DSA</text>
  </g>

  <!-- Badge 3: Competitive Programming -->
  <g transform="translate(210, 0)">
    <rect width="230" height="32" rx="16" fill="#450a0a" stroke="#ef4444" stroke-width="1.5" />
    <g transform="translate(10, 6)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
        <path d="M4 22h16"></path>
        <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"></path>
        <path d="M12 2a8 8 0 0 0-8 8h16a8 8 0 0 0-8-8z"></path>
      </svg>
    </g>
    <text x="130" y="17" dominant-baseline="middle" fill="#f8fafc" font-size="12" font-family="Montserrat, Poppins, sans-serif" font-weight="600" text-anchor="middle">Competitive Programming</text>
  </g>

  <!-- Badge 4: Software Development -->
  <g transform="translate(455, 0)">
    <rect width="210" height="32" rx="16" fill="#062f4f" stroke="#0ea5e9" stroke-width="1.5" />
    <g transform="translate(10, 6)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
        <line x1="8" y1="21" x2="16" y2="21"></line>
        <line x1="12" y1="17" x2="12" y2="21"></line>
      </svg>
    </g>
    <text x="120" y="17" dominant-baseline="middle" fill="#f8fafc" font-size="12" font-family="Montserrat, Poppins, sans-serif" font-weight="600" text-anchor="middle">Software Development</text>
  </g>
</g>


</svg>